<template>
  <div class="contact-container">
    <div class="contact-wrapper">
      <div class="section-header" data-scroll-id="about-section">
        <div class="icon-wrapper">
          <lightning-icon icon-name="utility:file" size="medium" class="header-icon">
          </lightning-icon>
        </div>
        <h2 class="section-title">Contact Me</h2>
      </div>
      <div class="genericP">
        <div class="contact-content">
          <div class="contact-form-section">
            <div class="form-card">
              <div class="genericPb">
                <h3 class="info-title"> Send Me a Message!</h3>
                <p class="info-subtitle">
                  Let’s Connect. Fill out the form below and I'll get back to you soon!
                </p>
              </div>
              <template if:true={showSuccess}>
                <div class="message-box success-message">
                  <lightning-icon icon-name="utility:success" size="small" class="message-icon">
                  </lightning-icon>
                  <p>Thank you! Your message has been sent successfully.</p>
                </div>
              </template>
              <template if:true={showError}>
                <div class="message-box error-message">
                  <lightning-icon icon-name="utility:error" size="small" class="message-icon">
                  </lightning-icon>
                  <p>{errorMessage}</p>
                </div>
              </template>
              <div class="contact-form">
                <div class="form-group">
                  <label for="name" class="form-label">
                  Full Name <span class="required">*</span>
                </label>
                  <div class="input-wrapper">
                    <lightning-icon icon-name="utility:user" size="x-small" class="input-icon">
                    </lightning-icon>
                    <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-input"
                    placeholder="Enter your full name"
                    value={formData.name}
                    onchange={handleInputChange}
                    required
                  />
                  </div>
                </div>
                <div class="form-group">
                  <label for="email" class="form-label">
                  Email Address <span class="required">*</span>
                </label>
                  <div class="input-wrapper">
                    <lightning-icon icon-name="utility:email" size="x-small" class="input-icon">
                    </lightning-icon>
                    <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-input"
                    placeholder="your.email@example.com"
                    value={formData.email}
                    onchange={handleInputChange}
                    required
                  />
                  </div>
                </div>
                <div class="form-group">
                  <label for="company" class="form-label">
                  Company
                </label>
                  <div class="input-wrapper">
                    <lightning-icon icon-name="utility:building" size="x-small" class="input-icon">
                    </lightning-icon>
                    <input
                    type="text"
                    id="company"
                    name="company"
                    class="form-input"
                    placeholder="Your company name"
                    value={formData.company}
                    onchange={handleInputChange}
                  />
                  </div>
                </div>
                <div class="form-group">
                  <label for="phone" class="form-label">
                  Phone Number
                </label>
                  <div class="input-wrapper">
                    <lightning-icon icon-name="utility:phone_portrait" size="x-small" class="input-icon">
                    </lightning-icon>
                    <input
                    type="tel"
                    id="phone"
                    name="phone"
                    class="form-input"
                    placeholder="+91-1234567890"
                    value={formData.phone}
                    onchange={handleInputChange}
                  />
                  </div>
                </div>
                <div class="form-group">
                  <label for="subject" class="form-label">
                  Subject <span class="required">*</span>
                </label>
                  <div class="input-wrapper">
                    <lightning-icon icon-name="utility:topic" size="x-small" class="input-icon">
                    </lightning-icon>
                    <input
                    type="text"
                    id="subject"
                    name="subject"
                    class="form-input"
                    placeholder="What is this regarding?"
                    value={formData.subject}
                    onchange={handleInputChange}
                    required
                  />
                  </div>
                </div>
                <div class="form-group">
                  <label for="message" class="form-label">
                  Message <span class="required">*</span>
                </label>
                  <div class="textarea-wrapper">
                    <lightning-icon icon-name="utility:comment" size="x-small" class="textarea-icon">
                    </lightning-icon>
                    <textarea
                    id="message"
                    name="message"
                    class="form-textarea"
                    placeholder="Tell me about your project or inquiry..."
                    rows="5"
                    value={formData.message}
                    onchange={handleInputChange}
                    required
                  ></textarea>
                  </div>
                </div>
                <div class="form-actions">
                  <button
                  class="submit-btn"
                  onclick={handleSubmit}
                  disabled={isSubmitting}>
                  <template if:false={isSubmitting}>
                    <lightning-icon 
                      icon-name="utility:send" 
                      size="x-small" 
                      class="btn-icon">
                    </lightning-icon>
                    Send Message
                  </template>
                  <template if:true={isSubmitting}>
                    <lightning-icon 
                      icon-name="utility:spinner" 
                      size="x-small" 
                      class="btn-icon spinner">
                    </lightning-icon>
                    Sending...
                  </template>
                </button>
                </div>
              </div>
            </div>
          </div>
          <div class="contact-info-section">
            <div class="info-card">
              <div class="genericPb">
                <h3 class="info-title">Professional Network</h3>
                <p class="info-subtitle">

                <p class="info-subtitle">
                  
                </p>
              </div>
              <div class="contact-details">
                <div class="detail-item">
                  <div class="detail-icon-wrapper">
                    <lightning-icon icon-name="utility:email" size="small" class="detail-icon">
                    </lightning-icon>
                  </div>
                  <div class="detail-content">
                    <p class="detail-label">Email : </p>
                    <p class="detail-value">rushikeshkale7287@gmail.com</p>
                  </div>
                </div>

                  </div>
                  <div class="detail-content">
                    <p class="detail-label">Location : </p>
                    <p class="detail-value">Pune, Maharashtra, India</p>
                  </div>
                </div>
                <div class="detail-item">
                  <div class="detail-icon-wrapper">
                    <lightning-icon icon-name="utility:socialshare" size="small" class="detail-icon">
                    </lightning-icon>
                  </div>
                  <div class="detail-content">
                    <p class="detail-label">LinkedIn : </p>

                    </div>
                     <div class="row">
                      <h2 class="visitCount">Visit Count : {count}</h2>
                    </div>
                    <div class="row">
                      <h3 class="info-title">Thank's for visit 😄</h3>
                    </div>
                    <div class="row">
                      <p class="info-subtitle">
                        © 2026 Rushikesh Kale. All rights reserved.
                      </p>
                    </div>
                    <div class="row social-links">

                  </div>
                </footer>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
